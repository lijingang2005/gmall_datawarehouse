# ===================================================
# Flume 配置：日志文件 → Kafka
# 用途：采集用户行为日志文件，发送到 Kafka topic_log
# 部署节点：hadoop102
# ===================================================

# 定义组件
a1.sources = r1
a1.channels = c1

# =================== Source 配置 ===================
# 使用 TAILDIR Source 监控日志目录增量
a1.sources.r1.type = TAILDIR
a1.sources.r1.filegroups = f1
a1.sources.r1.filegroups.f1 = /opt/module/applog/log/app.*
a1.sources.r1.positionFile = /opt/module/flume-1.10.1/filetokafka/taildir_position.json

# =================== Channel 配置 ===================
# 使用 Kafka Channel，直接将 Event 发送到 Kafka
a1.channels.c1.type = org.apache.flume.channel.kafka.KafkaChannel
a1.channels.c1.kafka.bootstrap.servers = <KAFKA_HOST1>:9092,<KAFKA_HOST2>:9092
a1.channels.c1.kafka.topic = topic_log
a1.channels.c1.parseAsFlumeEvent = false

# =================== 组装 ===================
a1.sources.r1.channels = c1
