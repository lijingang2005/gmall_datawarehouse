# ===================================================
# Flume 配置：Kafka → HDFS（业务数据消费端）
# 用途：从 Kafka topic_db 消费数据，按表名分目录写入 HDFS
# 部署节点：hadoop103
# ===================================================

# 定义组件
a1.sources = r1
a1.channels = c1
a1.sinks = k1

# =================== Source 配置 ===================
# Kafka Source：消费业务数据
a1.sources.r1.type = org.apache.flume.source.kafka.KafkaSource
a1.sources.r1.batchSize = 5000
a1.sources.r1.batchDurationMillis = 2000
a1.sources.r1.kafka.bootstrap.servers = <KAFKA_HOST1>:9092,<KAFKA_HOST2>:9092,<KAFKA_HOST3>:9092
a1.sources.r1.kafka.topics = topic_db
a1.sources.r1.kafka.consumer.group.id = flume_db1

# 拦截器：解决零点漂移 + 提取表名
a1.sources.r1.interceptors = i1
a1.sources.r1.interceptors.i1.type = com.lijingang.gmall.flume.interceptor.TimestampAndTableNameInterceptor$Builder

# =================== Channel 配置 ===================
# File Channel：数据可靠存储
a1.channels.c1.type = file
a1.channels.c1.checkpointDir = /opt/module/flume-1.10.1/checkpoint/db
a1.channels.c1.dataDirs = /opt/module/flume-1.10.1/data/db/
a1.channels.c1.maxFileSize = 2146435071
a1.channels.c1.capacity = 1000000
a1.channels.c1.keep-alive = 6

# =================== Sink 配置 ===================
# HDFS Sink：按表名分目录写入
a1.sinks.k1.type = hdfs
a1.sinks.k1.hdfs.path = /origin_data/gmall/db/%{tableName}_inc/%Y-%m-%d
a1.sinks.k1.hdfs.filePrefix = db
a1.sinks.k1.hdfs.round = false

# 小文件控制
a1.sinks.k1.hdfs.rollInterval = 10
a1.sinks.k1.hdfs.rollSize = 134217728
a1.sinks.k1.hdfs.rollCount = 0

# 压缩配置
a1.sinks.k1.hdfs.fileType = CompressedStream
a1.sinks.k1.hdfs.codeC = gzip

# =================== 组装 ===================
a1.sources.r1.channels = c1
a1.sinks.k1.channel = c1
