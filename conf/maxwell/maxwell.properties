# ===================================================
# Maxwell 配置
# 用途：监听 MySQL Binlog，将数据变更发送到 Kafka
# 部署节点：hadoop102
# ===================================================

# =================== Kafka 配置 ===================
producer=kafka
kafka.bootstrap.servers=<KAFKA_HOST1>:9092,<KAFKA_HOST2>:9092,<KAFKA_HOST3>:9092
# 目标 Kafka Topic
kafka_topic=topic_db
# 按主键分区，避免数据倾斜
producer_partition_by=primary_key

# =================== MySQL 配置 ===================
host=<MYSQL_HOST>
user=maxwell
password=<MAXWELL_PASSWORD>
jdbc_options=useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true

# =================== 过滤配置 ===================
# 过滤 gmall 中的 z_log 表（日志备份表，无需采集）
filter=exclude:gmall.z_log

# =================== 断点续传配置 ===================
# 客户端 ID（用于记录消费位置）
client_id=maxwell_client_01
